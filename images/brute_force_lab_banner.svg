<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c18"/>
      <stop offset="100%" stop-color="#0d1020"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1f6e"/>
      <stop offset="100%" stop-color="#1a1450"/>
    </linearGradient>
    <linearGradient id="attackGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6e1f2a"/>
      <stop offset="100%" stop-color="#501418"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <clipPath id="clip"><rect width="800" height="400" rx="12"/></clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="800" height="400" fill="url(#bg)"/>
    <g stroke="#151830" stroke-width="0.5" opacity="0.5">
      <line x1="0" y1="50"  x2="800" y2="50"/>
      <line x1="0" y1="100" x2="800" y2="100"/>
      <line x1="0" y1="150" x2="800" y2="150"/>
      <line x1="0" y1="200" x2="800" y2="200"/>
      <line x1="0" y1="250" x2="800" y2="250"/>
      <line x1="0" y1="300" x2="800" y2="300"/>
      <line x1="0" y1="350" x2="800" y2="350"/>
      <line x1="100" y1="0" x2="100" y2="400"/>
      <line x1="200" y1="0" x2="200" y2="400"/>
      <line x1="300" y1="0" x2="300" y2="400"/>
      <line x1="400" y1="0" x2="400" y2="400"/>
      <line x1="500" y1="0" x2="500" y2="400"/>
      <line x1="600" y1="0" x2="600" y2="400"/>
      <line x1="700" y1="0" x2="700" y2="400"/>
    </g>
    <ellipse cx="160" cy="200" rx="200" ry="150" fill="#2233ff" opacity="0.05" filter="url(#softglow)"/>
    <ellipse cx="640" cy="200" rx="200" ry="150" fill="#aa2233" opacity="0.06" filter="url(#softglow)"/>
    <!-- Attacker node (Kali) -->
    <circle cx="150" cy="180" r="52" fill="none" stroke="#4466ff" stroke-width="0.5" opacity="0.2"/>
    <circle cx="150" cy="180" r="42" fill="url(#nodeGrad)" stroke="#4466ff" stroke-width="1" filter="url(#glow)"/>
    <line x1="138" y1="170" x2="162" y2="170" stroke="#4466ff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="150" y1="160" x2="150" y2="195" stroke="#4466ff" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="150" cy="170" r="6" fill="none" stroke="#4466ff" stroke-width="1.2"/>
    <rect x="136" y="176" width="28" height="2" rx="1" fill="#4466ff" opacity="0.5"/>
    <rect x="136" y="180" width="20" height="2" rx="1" fill="#4466ff" opacity="0.3"/>
    <rect x="136" y="184" width="24" height="2" rx="1" fill="#4466ff" opacity="0.4"/>
    <text font-family="monospace" font-size="10" fill="#6688ff" x="150" y="236" text-anchor="middle" letter-spacing="1">KALI LINUX</text>
    <text font-family="monospace" font-size="9"  fill="#334488" x="150" y="250" text-anchor="middle">192.168.1.10</text>
    <!-- Target node (Metasploitable) -->
    <circle cx="650" cy="180" r="52" fill="none" stroke="#ff4455" stroke-width="0.5" opacity="0.2"/>
    <circle cx="650" cy="180" r="42" fill="url(#attackGrad)" stroke="#ff4455" stroke-width="1" filter="url(#glow)"/>
    <rect x="638" y="160" width="24" height="4" rx="1" fill="none" stroke="#ff4455" stroke-width="1"/>
    <rect x="638" y="167" width="24" height="4" rx="1" fill="none" stroke="#ff4455" stroke-width="1"/>
    <rect x="638" y="174" width="24" height="4" rx="1" fill="none" stroke="#ff4455" stroke-width="1"/>
    <circle cx="658" cy="162" r="1.5" fill="#ff4455"/>
    <circle cx="658" cy="169" r="1.5" fill="#ff8888" opacity="0.5"/>
    <circle cx="658" cy="176" r="1.5" fill="#ff4455"/>
    <text font-family="monospace" font-size="10" fill="#ff6677" x="650" y="236" text-anchor="middle" letter-spacing="1">METASPLOITABLE</text>
    <text font-family="monospace" font-size="9"  fill="#883344" x="650" y="250" text-anchor="middle">192.168.1.132</text>
    <!-- Attack lines (static dashes) -->
    <line x1="192" y1="165" x2="608" y2="165" stroke="#4466ff" stroke-width="1" stroke-dasharray="6 4" opacity="0.5"/>
    <text font-family="monospace" font-size="9" fill="#4466ff" x="400" y="158" text-anchor="middle" opacity="0.8">FTP :21</text>
    <line x1="195" y1="185" x2="605" y2="185" stroke="#aa44ff" stroke-width="1" stroke-dasharray="6 4" opacity="0.4"/>
    <text font-family="monospace" font-size="9" fill="#aa44ff" x="400" y="196" text-anchor="middle" opacity="0.8">HTTP/DVWA :80</text>
    <line x1="192" y1="205" x2="608" y2="205" stroke="#ff7733" stroke-width="1" stroke-dasharray="6 4" opacity="0.4"/>
    <text font-family="monospace" font-size="9" fill="#ff7733" x="400" y="218" text-anchor="middle" opacity="0.8">SMB :445</text>
    <!-- Arrow heads -->
    <polygon points="608,162 600,158 600,168" fill="#4466ff" opacity="0.6"/>
    <polygon points="605,182 597,178 597,188" fill="#aa44ff" opacity="0.5"/>
    <polygon points="608,202 600,198 600,208" fill="#ff7733" opacity="0.5"/>
    <!-- Center panel: Medusa terminal -->
    <rect x="320" y="50" width="160" height="120" rx="8" fill="#080c10" stroke="#2233aa" stroke-width="0.8"/>
    <text font-family="monospace" font-size="8"  fill="#334488" x="400" y="68" text-anchor="middle" letter-spacing="2">MEDUSA v2.3</text>
    <line x1="328" y1="72" x2="472" y2="72" stroke="#2233aa" stroke-width="0.5"/>
    <text font-family="monospace" font-size="9" fill="#6688ff" x="334" y="88">medusa -h target</text>
    <text font-family="monospace" font-size="9" fill="#334488" x="334" y="101">-U users.txt</text>
    <text font-family="monospace" font-size="9" fill="#334488" x="334" y="114">-P passwords.txt</text>
    <text font-family="monospace" font-size="9" fill="#334488" x="334" y="127">-M ftp -t 5</text>
    <rect x="330" y="156" width="140" height="18" rx="3" fill="#0d1a0a" stroke="#224422" stroke-width="0.5"/>
    <text font-family="monospace" font-size="8" fill="#44aa44" x="400" y="169" text-anchor="middle">ACCOUNT FOUND: msfadmin</text>
    <!-- Title -->
    <text font-family="monospace" font-size="22" font-weight="bold" fill="#3355ee" x="400" y="296" text-anchor="middle" letter-spacing="3" filter="url(#glow)">BRUTE FORCE</text>
    <text font-family="monospace" font-size="13" fill="#223388" x="400" y="316" text-anchor="middle" letter-spacing="5">LAB</text>
    <line x1="300" y1="322" x2="500" y2="322" stroke="#223388" stroke-width="0.5"/>
    <!-- Tags -->
    <rect x="40"  y="338" width="72"  height="20" rx="4" fill="#0a0d22" stroke="#2233aa" stroke-width="0.8"/>
    <text font-family="monospace" font-size="9" fill="#4466ff" x="76"  y="352" text-anchor="middle">Kali Linux</text>
    <rect x="124" y="338" width="58"  height="20" rx="4" fill="#0a0d22" stroke="#2233aa" stroke-width="0.8"/>
    <text font-family="monospace" font-size="9" fill="#4466ff" x="153" y="352" text-anchor="middle">Medusa</text>
    <rect x="194" y="338" width="80"  height="20" rx="4" fill="#0a0d22" stroke="#3322aa" stroke-width="0.8"/>
    <text font-family="monospace" font-size="9" fill="#8866ff" x="234" y="352" text-anchor="middle">Metasploitable</text>
    <rect x="286" y="338" width="46"  height="20" rx="4" fill="#100a0d" stroke="#aa2233" stroke-width="0.8"/>
    <text font-family="monospace" font-size="9" fill="#ff4455" x="309" y="352" text-anchor="middle">DVWA</text>
    <rect x="344" y="338" width="40"  height="20" rx="4" fill="#100a0d" stroke="#aa2233" stroke-width="0.8"/>
    <text font-family="monospace" font-size="9" fill="#ff4455" x="364" y="352" text-anchor="middle">FTP</text>
    <rect x="396" y="338" width="38"  height="20" rx="4" fill="#100a0d" stroke="#aa2233" stroke-width="0.8"/>
    <text font-family="monospace" font-size="9" fill="#ff7733" x="415" y="352" text-anchor="middle">SMB</text>
    <rect x="446" y="338" width="80"  height="20" rx="4" fill="#0f0a00" stroke="#774400" stroke-width="0.8"/>
    <text font-family="monospace" font-size="9" fill="#ff7733" x="486" y="352" text-anchor="middle">Brute Force</text>
    <rect x="562" y="338" width="150" height="20" rx="4" fill="#0a0c1a" stroke="#223355" stroke-width="0.8"/>
    <text font-family="monospace" font-size="8" fill="#334477" x="637" y="352" text-anchor="middle">Santander Bootcamp 2025</text>
    <!-- Warning + nmap -->
    <rect x="40" y="366" width="100" height="18" rx="3" fill="#120f00" stroke="#664400" stroke-width="0.5"/>
    <text font-family="monospace" font-size="8" fill="#886622" x="90" y="378" text-anchor="middle">&#9888; EDUCATIONAL</text>
    <text font-family="monospace" font-size="8" fill="#1a2244" x="760" y="370" text-anchor="end">nmap -sV target</text>
    <text font-family="monospace" font-size="8" fill="#1a2244" x="760" y="382" text-anchor="end">21/tcp · 80/tcp · 445/tcp</text>
    <!-- Border & corners -->
    <rect x="0" y="0" width="800" height="400" rx="12" fill="none" stroke="#4466ff" stroke-width="0.5" opacity="0.12"/>
    <path d="M16,28 L16,16 L28,16" fill="none" stroke="#4466ff" stroke-width="1" opacity="0.4"/>
    <path d="M784,372 L784,384 L772,384" fill="none" stroke="#ff4455" stroke-width="1" opacity="0.4"/>
  </g>
</svg>
